<div class="page-wrapper">
    <div class="container-lg py-4 px-3">

        <!-- Header -->
        <header class="game-header text-center mb-5">
            <div class="spy-icon mb-3">🕵️</div>
            <h1 class="game-title">CODE NAMES</h1>
            <p class="game-subtitle">Το Παιχνίδι των Κατασκόπων</p>
        </header>

        <!-- Grid -->
        <div class="grid-section mb-4">
            <div class="grid-card">
                <div class="grid-scroll">
                    <!-- Column headers -->
                    <div class="d-flex align-items-center">
                        <div class="grid-corner"></div>
                        <div *ngFor="let cell of grid[0]" class="grid-col-label">{{cell.column + 1}}</div>
                    </div>
                    <!-- Grid rows -->
                    <div *ngFor="let row of grid" class="d-flex align-items-center">
                        <div class="grid-row-label">{{row[0].row + 1}}</div>
                        <div *ngFor="let cell of row" [ngClass]="getCellStyle(cell)" class="game-cell"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Team Legend -->
        <div class="legend-section mb-4" *ngIf="teams && teams.length > 0">
            <div class="legend-grid">
                <div *ngFor="let team of teams; index as index"
                    class="legend-card"
                    [ngClass]="getTeamCardStyle(index)">
                    <span class="legend-dot"></span>
                    <div class="legend-info">
                        <div class="legend-name">{{team.displayName}}</div>
                        <div class="legend-count">{{team.cells.length}} κάρτες</div>
                    </div>
                </div>
                <div class="legend-card legend-card-neutral">
                    <span class="legend-dot"></span>
                    <div class="legend-info">
                        <div class="legend-name">Ουδέτερα</div>
                    </div>
                </div>
                <div class="legend-card legend-card-assassin" *ngIf="assassins && assassins.length > 0">
                    <span class="legend-dot">✕</span>
                    <div class="legend-info">
                        <div class="legend-name">Δολοφόνος</div>
                        <div class="legend-count">{{assassins.length}}</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="settings-panel mb-4">
            <h3 class="panel-title">Ρυθμίσεις Παιχνιδιού</h3>

            <div class="settings-grid">
                <div class="setting-group">
                    <label for="teamCount" class="setting-label">Αριθμός Ομάδων</label>
                    <input type="number" id="teamCount" class="setting-input" [(ngModel)]="teamCount" min="2" max="4">
                </div>
                <div class="setting-group">
                    <label for="gridSize" class="setting-label">Μέγεθος Πλέγματος</label>
                    <input type="number" id="gridSize" class="setting-input" [(ngModel)]="gridSize" min="2">
                </div>
                <div class="setting-group">
                    <label for="cardCount" class="setting-label">Κάρτες ανά Ομάδα</label>
                    <input type="number" id="cardCount" class="setting-input" [(ngModel)]="cardCount" min="2">
                </div>
                <div class="setting-group">
                    <label for="assassinCount" class="setting-label">Αριθμός Δολοφόνων</label>
                    <input type="number" id="assassinCount" class="setting-input" [(ngModel)]="assassinCount" min="0">
                </div>
            </div>

            <div *ngIf="errorMessage != null" class="error-alert">
                ⚠️ {{errorMessage}}
            </div>

            <div class="actions-row">
                <button class="btn-reset" (click)="reset()">↺ Επαναφορά</button>
                <button class="btn-generate" (click)="newGame()">▶ Δημιουργία Νέου Παιχνιδιού</button>
                <button class="btn-copy" (click)="copyLink()" [class.copied]="linkCopied">
                    <span *ngIf="!linkCopied">🔗 Αντιγραφή Συνδέσμου</span>
                    <span *ngIf="linkCopied">✓ Αντιγράφηκε!</span>
                </button>
            </div>
        </div>

    </div>
</div>
